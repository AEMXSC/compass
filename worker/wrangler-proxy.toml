name = "compass-proxy"
main = "compass-proxy.js"
compatibility_date = "2024-01-01"

[vars]
ORIGIN_HOSTNAME = "eds-migration--compass--aemxsc.aem.live"

# Routes — add in Cloudflare dashboard or via wrangler:
#   compass.aemxsc.com/*
#
# Deploy:  npx wrangler deploy --config wrangler-proxy.toml
# Change target without redeploying: update ORIGIN_HOSTNAME in Workers & Pages → compass-proxy → Settings → Variables
